name: Publish NuGet Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Authenticate to NuGet
        uses: actions/nuget-auth@v1

      - name: Pack and publish all packages
        shell: pwsh
        run: .\publish-nuget.ps1
