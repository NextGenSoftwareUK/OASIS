name: Publish NuGet Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack all packages
        shell: pwsh
        run: .\publish-nuget.ps1 -SkipPush

      - name: Get NuGet token
        uses: actions/nuget-auth@v1

      - name: Push all packages to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem -Path .\nupkgs\*.nupkg | ForEach-Object {
            Write-Host "Pushing $($_.Name)..."
            dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
