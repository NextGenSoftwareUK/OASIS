<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" width="500" height="500">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#08122a"/>
      <stop offset="100%" stop-color="#020508"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#040c1a"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#0066ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0033aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0044cc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="ultraBloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="38" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0.2 1 0 0
                0 0.6 1 0 0.05
                0 1   1 0 0.5
                0 0   0 1.2 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wideBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0.3 1 0 0
                0 0.7 1 0 0.1
                0 1   1 0 0.6
                0 0   0 1.1 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="midGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0.1 1 0 0
                0 0.5 1 0 0.2
                0 1   1 0 0.8
                0 0   0 1 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tightCore" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bgHalo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0.1 1 0 0
                0 0.4 1 0 0
                0 1   1 0 0.3
                0 0   0 0.6 0"/>
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#bgGrad)"/>
  <circle cx="250" cy="250" r="90" fill="none" stroke="#0077ff" stroke-width="44" filter="url(#bgHalo)" opacity="0.9"/>
  <circle cx="250" cy="250" r="240" fill="url(#bgGlow)"/>

  <circle cx="60"  cy="80"  r="1.3" fill="#c0e8ff" opacity="0.6"/>
  <circle cx="140" cy="40"  r="0.9" fill="#ffffff"  opacity="0.5"/>
  <circle cx="380" cy="70"  r="1.1" fill="#c0e8ff"  opacity="0.55"/>
  <circle cx="440" cy="130" r="0.8" fill="#ffffff"  opacity="0.4"/>
  <circle cx="80"  cy="390" r="1.2" fill="#c0e8ff"  opacity="0.55"/>
  <circle cx="420" cy="420" r="1.0" fill="#ffffff"  opacity="0.5"/>
  <circle cx="320" cy="460" r="0.9" fill="#c0e8ff"  opacity="0.4"/>
  <circle cx="180" cy="470" r="1.1" fill="#ffffff"  opacity="0.5"/>
  <circle cx="460" cy="280" r="0.8" fill="#4bf0ff"  opacity="0.6"/>
  <circle cx="30"  cy="220" r="1.0" fill="#ffffff"  opacity="0.5"/>
  <circle cx="400" cy="200" r="0.7" fill="#4bf0ff"  opacity="0.7"/>
  <circle cx="100" cy="300" r="0.8" fill="#4bf0ff"  opacity="0.6"/>
  <circle cx="350" cy="350" r="0.6" fill="#4bf0ff"  opacity="0.55"/>
  <circle cx="70"  cy="160" r="0.7" fill="#88ccff"  opacity="0.5"/>
  <circle cx="430" cy="340" r="0.6" fill="#88ccff"  opacity="0.45"/>

  <circle cx="250" cy="250" r="190" fill="url(#circleGrad)"/>
  <circle cx="250" cy="250" r="170" fill="url(#coreGlow)"/>

  <circle cx="250" cy="250" r="90" fill="none" stroke="#0055ee" stroke-width="60" opacity="0.3"  filter="url(#ultraBloom)"/>
  <circle cx="250" cy="250" r="90" fill="none" stroke="#0088ff" stroke-width="50" opacity="0.45" filter="url(#wideBloom)"/>
  <circle cx="250" cy="250" r="90" fill="none" stroke="#22ccff" stroke-width="38" opacity="0.65" filter="url(#midGlow)"/>
  <circle cx="250" cy="250" r="90" fill="none" stroke="#66eeff" stroke-width="26" opacity="0.85" filter="url(#tightCore)"/>
  <circle cx="250" cy="250" r="90" fill="none" stroke="#e0faff" stroke-width="4"/>

  <circle cx="250" cy="250" r="182" fill="none" stroke="#0066ff" stroke-width="2"   opacity="0.7" filter="url(#midGlow)"/>
  <circle cx="250" cy="250" r="182" fill="none" stroke="#88ddff" stroke-width="0.8" opacity="0.6"/>
  <circle cx="250" cy="250" r="152" fill="none" stroke="#0055cc" stroke-width="0.8" opacity="0.4"/>
</svg>
