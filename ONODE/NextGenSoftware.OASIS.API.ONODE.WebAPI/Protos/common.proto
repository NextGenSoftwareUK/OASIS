syntax = "proto3";

option csharp_namespace = "NextGenSoftware.OASIS.API.ONODE.WebAPI.Grpc";
package oasis.web4;

message JsonResponse {
  bool is_error = 1;
  string message = 2;
  string json = 3;
}

message OASISGrpcResponse {
  bool is_error = 1;
  string message = 2;
}

message StringResponse {
  bool is_error = 1;
  string message = 2;
  string value = 3;
}

message StringListResponse {
  bool is_error = 1;
  string message = 2;
  repeated string values = 3;
}

message DoubleResponse {
  bool is_error = 1;
  string message = 2;
  double value = 3;
}
